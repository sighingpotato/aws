name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 올라오면 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 내 코드 당겨오기
      uses: actions/checkout@v3

    - name: 2. 자바 17 세팅
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'corretto'

    - name: 3. 빌드하기 (압축)
      run: |
        chmod +x gradlew
        ./gradlew clean build -x test

    - name: 4. 도커 허브 로그인
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 5. 도커 이미지 만들고 허브로 올리기(Push)
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/camp-app:latest

    - name: 6. EC2에 접속해서 새 서버 띄우기
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          # 옛날 컨테이너 죽이고 삭제
          sudo docker stop camp-app || true
          sudo docker rm camp-app || true
          # 최신 박스 당겨오기
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/camp-app:latest
          # 8080 포트로 새 박스 실행한다.
          sudo docker run -d -p 8080:8080 --name camp-app ${{ secrets.DOCKER_USERNAME }}/camp-app:latest
